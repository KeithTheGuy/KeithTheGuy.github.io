<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keith</title>
<meta name="description" content="Keith's corner of the internet — small things, in orbit.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Karla:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#080A13;
    --panel:rgba(18,16,28,.8);
    --line:rgba(155,138,120,.16);
    --ink:#F5EFE6;
    --mut:#A99E9E;
    --dim:#6B6270;
    --warm:#FFAE7B;
    --ember:#FF8E5E;
    --up:#7BD8A8;
    --down:#E88A7B;
    --serif:"Fraunces",Georgia,serif;
    --sans:"Karla",system-ui,sans-serif;
    --mono:"IBM Plex Mono",Consolas,monospace;
  }
  *{box-sizing:border-box}
  html{background:var(--night)}
  body{
    margin:0;min-height:100svh;color:var(--ink);
    font-family:var(--sans);font-weight:300;font-size:16px;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  #sky{position:fixed;inset:0;z-index:-1}
  #runner{position:fixed;left:0;right:0;bottom:0;height:96px;width:100%;z-index:5;pointer-events:none}
  .wrap{
    max-width:none;margin:0;padding:0 clamp(20px,4vw,44px);
    min-height:100svh;display:flex;flex-direction:column;
  }

  .top{display:flex;padding:24px 0 0}
  .greet{
    font-family:var(--mono);font-size:10px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--warm);
  }

  /* ---------- the system ---------- */
  #space{flex:1;position:relative;min-height:380px}
  #orbits{position:absolute;inset:0;width:100%;height:100%}

  #sun{
    position:absolute;z-index:30;width:58px;height:58px;margin:-29px 0 0 -29px;
    border-radius:50%;
    background:radial-gradient(circle at 38% 34%,#FFE9C9 0%,#FFC48E 38%,#FF8E5E 74%,rgba(255,142,94,.0) 100%);
    box-shadow:0 0 44px 10px rgba(255,174,123,.34),0 0 120px 40px rgba(255,142,94,.12);
    animation:breathe 5.5s ease-in-out infinite;
  }
  @keyframes breathe{50%{box-shadow:0 0 54px 14px rgba(255,174,123,.44),0 0 140px 48px rgba(255,142,94,.16)}}
  #sun .slabel{
    position:absolute;top:100%;left:50%;transform:translate(-50%,14px);
    font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--warm);
    text-transform:lowercase;white-space:nowrap;
  }

  .planet{
    position:absolute;left:0;top:0;z-index:20;
    display:block;text-decoration:none;color:inherit;
    width:44px;height:44px;margin:-22px 0 0 -22px;
    outline:none;
  }
  .planet .orb{
    --accent:#A99E9E;
    position:absolute;left:50%;top:50%;
    width:var(--d,14px);height:var(--d,14px);
    margin:calc(var(--d,14px)/-2) 0 0 calc(var(--d,14px)/-2);
    border-radius:50%;
    background:radial-gradient(circle at 36% 32%,#fff 0%,var(--accent) 45%,color-mix(in srgb,var(--accent) 45%,#000) 100%);
    box-shadow:0 0 14px color-mix(in srgb,var(--accent) 60%,transparent);
    transition:transform .18s ease,box-shadow .18s ease,filter .3s ease;
  }
  .planet.fail .orb{filter:grayscale(.85) brightness(.6)}
  .planet:hover .orb,.planet:focus-visible .orb{
    transform:scale(1.35);
    box-shadow:0 0 26px color-mix(in srgb,var(--accent) 85%,transparent);
  }
  .planet .plabel{
    position:absolute;top:100%;left:50%;transform:translate(-50%,-4px);
    font-family:var(--mono);font-size:10px;letter-spacing:.22em;color:var(--dim);
    text-transform:lowercase;white-space:nowrap;transition:color .18s;
  }
  .planet:hover .plabel,.planet:focus-visible .plabel{color:var(--ink)}
  .planet .tip{
    position:absolute;bottom:100%;left:50%;transform:translate(-50%,-6px);
    font-family:var(--mono);font-size:11px;letter-spacing:.04em;
    color:var(--ink);background:var(--panel);
    border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);
    border-radius:6px;padding:6px 10px;white-space:nowrap;
    opacity:0;pointer-events:none;transition:opacity .18s ease;
    font-variant-numeric:tabular-nums;z-index:99;
  }
  .planet:hover .tip,.planet:focus-visible .tip{opacity:1}
  .tip .up{color:var(--up)} .tip .down{color:var(--down)}

  #mystery{
    position:absolute;z-index:10;width:10px;height:10px;margin:-5px 0 0 -5px;
    border-radius:50%;border:1px dashed var(--dim);opacity:.6;
  }
  #mystery .plabel{
    position:absolute;top:100%;left:50%;transform:translate(-50%,6px);
    font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim);
  }

  footer{
    padding:0 0 30px;text-align:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--dim);
  }
  footer .moon{color:var(--warm)}

  @media (prefers-reduced-motion:reduce){
    #sun{animation:none}
    .planet .orb,.planet .plabel,.planet .tip{transition:none}
  }
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>
<canvas id="runner" aria-hidden="true"></canvas>

<div class="wrap">
  <header class="top">
    <span class="greet" id="greet">Good evening</span>
  </header>

  <main id="space" aria-label="Keith's projects, arranged as a solar system">
    <canvas id="orbits" aria-hidden="true"></canvas>
    <div id="sun" aria-hidden="true"><span class="slabel">keith</span></div>
    <div id="mystery" aria-hidden="true"><span class="plabel">?</span></div>
  </main>

  <footer><span class="moon">☾</span> &nbsp;made at night · keith</footer>
</div>

<script>
(function(){
"use strict";
var reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;
var $=function(id){return document.getElementById(id)};
var esc=function(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})};

/* ---------- dusk sky: stars + warm horizon + fireflies + meteors ---------- */
var cv=$("sky"),cx=cv.getContext("2d");
var stars=[],flies=[],meteors=[],W=0,H=0,lastMeteor=0;
function size(){
  var d=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=W*d;cv.height=H*d;cx.setTransform(d,0,0,d,0,0);
  stars=[];flies=[];
  for(var i=0,n=Math.floor(W*H/6000);i<n;i++)stars.push({
    x:Math.random()*W,y:Math.random()*H*.82,r:Math.random()*1.25+.25,
    p:Math.random()*6.28,s:.3+Math.random()*.7
  });
  for(i=0;i<Math.max(6,Math.floor(W/160));i++)flies.push({
    x:Math.random()*W,y:H*.7+Math.random()*H*.28,
    a:Math.random()*6.28,sp:.14+Math.random()*.2,
    p:Math.random()*6.28,ps:.4+Math.random()*.8
  });
}
addEventListener("resize",size);size();
function skyFrame(t){
  cx.clearRect(0,0,W,H);
  var g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#070912");g.addColorStop(.65,"#0B0C17");g.addColorStop(1,"#171020");
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  var hg=cx.createRadialGradient(W*.5,H*1.12,H*.05,W*.5,H*1.12,H*.62);
  hg.addColorStop(0,"rgba(255,142,94,.20)");hg.addColorStop(.5,"rgba(255,142,94,.06)");hg.addColorStop(1,"rgba(255,142,94,0)");
  cx.fillStyle=hg;cx.fillRect(0,H*.4,W,H*.6);
  var i;
  cx.fillStyle="#F5EFE6";
  for(i=0;i<stars.length;i++){
    var s=stars[i];
    cx.globalAlpha=(reduced?.5:(.22+.5*Math.abs(Math.sin(t/1600*s.s+s.p))))*.8;
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);cx.fill();
  }
  for(i=0;i<flies.length;i++){
    var f=flies[i];
    if(!reduced){
      f.a+=(Math.random()-.5)*.3;
      f.x+=Math.cos(f.a)*f.sp;f.y+=Math.sin(f.a)*f.sp*.6;
      if(f.x<-10)f.x=W+10;if(f.x>W+10)f.x=-10;
      if(f.y<H*.62)f.y=H*.62;if(f.y>H)f.y=H;
    }
    var glow=reduced?.5:Math.max(0,Math.sin(t/900*f.ps+f.p));
    if(glow>.05){
      cx.globalAlpha=glow*.85;
      cx.fillStyle="#FFC48E";
      cx.beginPath();cx.arc(f.x,f.y,1.6,0,6.28);cx.fill();
      cx.globalAlpha=glow*.18;
      cx.beginPath();cx.arc(f.x,f.y,6,0,6.28);cx.fill();
      cx.fillStyle="#F5EFE6";
    }
  }
  cx.globalAlpha=1;
  if(!reduced){
    if(t-lastMeteor>11000+Math.random()*9000){
      lastMeteor=t;
      meteors.push({x:Math.random()*W*.8+W*.1,y:-20,vx:2.5+Math.random()*3,vy:4.5+Math.random()*3,life:1});
    }
    for(i=meteors.length-1;i>=0;i--){
      var m=meteors[i];
      m.x+=m.vx*3;m.y+=m.vy*3;m.life-=.02;
      if(m.life<=0||m.y>H*.7){meteors.splice(i,1);continue}
      var mg=cx.createLinearGradient(m.x-m.vx*14,m.y-m.vy*14,m.x,m.y);
      mg.addColorStop(0,"rgba(245,239,230,0)");mg.addColorStop(1,"rgba(245,239,230,"+(.6*m.life)+")");
      cx.strokeStyle=mg;cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(m.x-m.vx*14,m.y-m.vy*14);cx.lineTo(m.x,m.y);cx.stroke();
    }
    requestAnimationFrame(skyFrame);
  }
}
requestAnimationFrame(skyFrame);

/* ---------- greeting ---------- */
var h=new Date().getHours();
$("greet").textContent=(h<5?"You're up late":h<12?"Good morning":h<17?"Good afternoon":"Good evening");

/* ---------- the system: planets are the nav ---------- */
var SQUASH=.42,space=$("space"),oc=$("orbits"),ox=oc.getContext("2d");
var system={sites:[],fracs:[],cx:0,cy:0,maxR:0,speed:1};

function layout(){
  var r=space.getBoundingClientRect();
  var d=Math.min(devicePixelRatio||1,2);
  oc.width=r.width*d;oc.height=r.height*d;ox.setTransform(d,0,0,d,0,0);
  system.cx=r.width/2;
  system.cy=r.height*.5;
  system.maxR=Math.min(r.width*.46,r.height*.62/SQUASH*.5);
  $("sun").style.left=system.cx+"px";
  $("sun").style.top=system.cy+"px";
  drawRings(r.width,r.height);
}
function drawRings(w,hh){
  ox.clearRect(0,0,w,hh);
  var i;
  for(i=0;i<system.fracs.length;i++){
    ox.strokeStyle="rgba(245,239,230,.09)";
    ox.lineWidth=1;ox.setLineDash([]);
    ox.beginPath();
    ox.ellipse(system.cx,system.cy,system.maxR*system.fracs[i],system.maxR*system.fracs[i]*SQUASH,0,0,6.28);
    ox.stroke();
  }
  /* the mystery ring */
  ox.strokeStyle="rgba(169,158,158,.12)";
  ox.setLineDash([3,7]);
  ox.beginPath();
  ox.ellipse(system.cx,system.cy,system.maxR,system.maxR*SQUASH,0,0,6.28);
  ox.stroke();
  ox.setLineDash([]);
}

var hoverCount=0;
function makePlanet(s,i,n){
  var a=document.createElement("a");
  a.className="planet";a.id="pl-"+s.slug;a.href=s.href;
  a.setAttribute("aria-label",s.title);
  var d=[15,12,17,13,19,14][i%6];
  a.innerHTML='<span class="orb" style="--accent:'+esc(s.accent)+';--d:'+d+'px"></span>'
    +'<span class="plabel">'+esc(s.title.toLowerCase())+'</span>'
    +'<span class="tip" id="tip-'+esc(s.slug)+'">waking…</span>';
  a.addEventListener("pointerenter",function(){hoverCount++});
  a.addEventListener("pointerleave",function(){hoverCount=Math.max(0,hoverCount-1)});
  a.addEventListener("focus",function(){hoverCount++});
  a.addEventListener("blur",function(){hoverCount=Math.max(0,hoverCount-1)});
  space.appendChild(a);
  return {el:a,frac:.36+(n<2?.3:i*(.49/Math.max(n-1,1))),theta:i*2.4,omega:.055/Math.pow(.36+i*(.49/Math.max(n-1,1)),1.5)};
}

var lastT=0;
function orbitFrame(t){
  var dt=Math.min((t-lastT)/1000,.05);lastT=t;
  system.speed+=((hoverCount>0?0:1)-system.speed)*Math.min(dt*4,1);
  var i;
  for(i=0;i<system.sites.length;i++){
    var p=system.sites[i];
    if(!reduced)p.theta+=p.omega*system.speed*dt;
    var x=system.cx+Math.cos(p.theta)*system.maxR*p.frac;
    var y=system.cy+Math.sin(p.theta)*system.maxR*p.frac*SQUASH;
    p.el.style.transform="translate("+x+"px,"+y+"px)";
    p.el.style.zIndex=Math.sin(p.theta)>0?40:20;
  }
  var mx=system.cx+Math.cos(-.9)*system.maxR;
  var my=system.cy+Math.sin(-.9)*system.maxR*SQUASH;
  $("mystery").style.left=mx+"px";$("mystery").style.top=my+"px";
  if(!reduced)requestAnimationFrame(orbitFrame);
}

/* probes: live glow + tooltip readouts */
var fmt=function(n){return n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})};
function probe(s){
  var a=$("pl-"+s.slug),tip=$("tip-"+s.slug);
  if(!s.probe){a.classList.add("ok");tip.textContent="online";return}
  fetch(s.probe.url+(s.probe.url.indexOf(".json")>0?"?ts="+Date.now():""),{cache:"no-store"})
    .then(function(r){if(!r.ok)throw 0;return s.probe.type==="ping"?null:r.json()})
    .then(function(j){
      a.classList.add("ok");
      if(s.probe.type==="spcx"){
        var d=(j.meta.price-j.meta.previousClose)/j.meta.previousClose*100,up=d>=0;
        tip.innerHTML="$"+fmt(j.meta.price)+' <span class="'+(up?"up":"down")+'">'+(up?"▲":"▼")+Math.abs(d).toFixed(1)+"%</span>";
      }else if(s.probe.type==="models"){
        var now=Date.now()/1000;
        var adds=j.models.filter(function(m){return m.created&&m.created>now-30*86400}).length;
        tip.innerHTML=j.models.length+" models · +"+adds+"/mo";
      }else{
        tip.textContent="online";
      }
    })
    .catch(function(){a.classList.add("fail");tip.textContent="napping"});
}

fetch("sites.json?ts="+Date.now(),{cache:"no-store"})
  .then(function(r){return r.json()})
  .then(function(cfg){
    var n=cfg.sites.length;
    system.fracs=[];
    system.sites=cfg.sites.map(function(s,i){
      var p=makePlanet(s,i,n);
      system.fracs.push(p.frac);
      return p;
    });
    layout();
    cfg.sites.forEach(probe);
    if(reduced){lastT=performance.now();orbitFrame(lastT)}
    else requestAnimationFrame(function(t){lastT=t;requestAnimationFrame(orbitFrame)});
  })
  .catch(function(){
    $("space").insertAdjacentHTML("beforeend",
      '<div style="position:absolute;left:50%;top:60%;transform:translateX(-50%);font-family:var(--mono);font-size:12px;color:var(--dim)">the sky is empty tonight — sites.json failed.</div>');
  });
addEventListener("resize",layout);

/* ---------- the little night walker ---------- */
var rc=$("runner"),rx=rc.getContext("2d"),RW=0,RH=96;
function rsize(){
  var d=Math.min(devicePixelRatio||1,2);
  RW=innerWidth;
  rc.width=RW*d;rc.height=RH*d;rx.setTransform(d,0,0,d,0,0);
}
addEventListener("resize",rsize);rsize();

var guy={
  x:Math.min(140,innerWidth*.2),dir:1,y:0,vy:0,
  state:"walk",until:0,phase:0,blink:0
};
function pick(now){
  var r=Math.random();
  if(guy.state==="walk"){
    if(r<.55){guy.state="idle";guy.until=now+1200+Math.random()*2600}
    else if(r<.7){guy.state="hop";guy.vy=-150}
    else{guy.dir*=-1;guy.until=now+2500+Math.random()*4500}
  }else{
    guy.state="walk";
    if(Math.random()<.4)guy.dir*=-1;
    guy.until=now+2500+Math.random()*5000;
  }
}
var lastR=0;
function runnerFrame(now){
  var dt=Math.min((now-lastR)/1000,.05);lastR=now;
  rx.clearRect(0,0,RW,RH);
  var ground=RH-8;

  if(guy.state==="hop"){
    guy.vy+=520*dt;guy.y-=guy.vy*dt;
    if(guy.y<=0){guy.y=0;guy.state="walk";guy.until=now+2000+Math.random()*4000}
    guy.x+=guy.dir*46*dt;
  }else if(guy.state==="walk"){
    guy.x+=guy.dir*40*dt;
    guy.phase+=dt*9;
    if(now>guy.until)pick(now);
  }else{
    guy.phase+=dt*1.4;
    if(now>guy.until)pick(now);
  }
  if(guy.x<26){guy.x=26;guy.dir=1}
  if(guy.x>RW-26){guy.x=RW-26;guy.dir=-1}
  if(Math.random()<.006)guy.blink=6;
  if(guy.blink>0)guy.blink--;

  var walking=guy.state==="walk";
  var bob=walking?Math.abs(Math.sin(guy.phase))*1.8:Math.sin(guy.phase)*0.7;
  var gy=ground-guy.y-bob;

  rx.save();
  rx.translate(guy.x,gy);
  rx.scale(guy.dir,1);

  rx.globalAlpha=Math.max(.08,.22-guy.y*.002);
  rx.fillStyle="#000";
  rx.beginPath();rx.ellipse(0,bob+guy.y+1,9-guy.y*.03,2.4,0,0,6.28);rx.fill();
  rx.globalAlpha=1;

  var sway=Math.sin(guy.phase*(walking?1:.8))*(walking?2.4:1.2);
  var lx=8,ly=-7+sway*.4;
  var lg=rx.createRadialGradient(lx,ly,1,lx,ly,26);
  lg.addColorStop(0,"rgba(255,196,142,.5)");lg.addColorStop(1,"rgba(255,196,142,0)");
  rx.fillStyle=lg;rx.beginPath();rx.arc(lx,ly,26,0,6.28);rx.fill();

  var swing=walking?Math.sin(guy.phase)*4.2:0;
  rx.strokeStyle="#F5EFE6";rx.lineWidth=2;rx.lineCap="round";
  rx.beginPath();rx.moveTo(-1,-8);rx.lineTo(-1+swing,0);rx.stroke();
  rx.beginPath();rx.moveTo(1,-8);rx.lineTo(1-swing,0);rx.stroke();

  rx.fillStyle="#F5EFE6";
  rx.beginPath();rx.roundRect(-3.5,-19,7,12,3);rx.fill();

  rx.fillStyle="#FFAE7B";
  rx.fillRect(-3.5,-17.5,7,2.5);
  rx.beginPath();
  rx.moveTo(-3,-16);
  rx.quadraticCurveTo(-8-(walking?2:0),-14+Math.sin(guy.phase*1.3)*1.6,-9-(walking?3:0),-11+Math.sin(guy.phase*1.3)*2);
  rx.lineTo(-6,-12);rx.closePath();rx.fill();

  rx.strokeStyle="#F5EFE6";rx.lineWidth=1.8;
  rx.beginPath();rx.moveTo(2,-15);rx.quadraticCurveTo(6,-13,lx-1,ly-3);rx.stroke();
  rx.strokeStyle="#FFC48E";rx.lineWidth=1.2;
  rx.strokeRect(lx-2.5,ly-3,5,6);
  rx.fillStyle="#FFC48E";
  rx.globalAlpha=.75+Math.sin(now/140)*.25;
  rx.fillRect(lx-1.2,ly-1.5,2.4,3);
  rx.globalAlpha=1;

  rx.fillStyle="#F5EFE6";
  rx.beginPath();rx.arc(0,-23,4.4,0,6.28);rx.fill();
  if(guy.blink===0){
    rx.fillStyle="#171020";
    rx.beginPath();rx.arc(2,-23.5,.9,0,6.28);rx.fill();
  }

  rx.restore();
  if(!reduced)requestAnimationFrame(runnerFrame);
}
if(reduced){lastR=performance.now();runnerFrame(lastR)}
else requestAnimationFrame(function(t){lastR=t;requestAnimationFrame(runnerFrame)});
})();
</script>
</body>
</html>
