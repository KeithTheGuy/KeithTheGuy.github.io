<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keith</title>
<meta name="description" content="Keith's corner of the internet — small things, left running.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600&family=Karla:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#080A13;
    --panel:rgba(18,16,28,.66);
    --line:rgba(155,138,120,.16);
    --ink:#F5EFE6;
    --mut:#A99E9E;
    --dim:#6B6270;
    --warm:#FFAE7B;
    --ember:#FF8E5E;
    --up:#7BD8A8;
    --down:#E88A7B;
    --serif:"Fraunces",Georgia,serif;
    --sans:"Karla",system-ui,sans-serif;
    --mono:"IBM Plex Mono",Consolas,monospace;
  }
  *{box-sizing:border-box}
  html{background:var(--night);scroll-behavior:smooth}
  body{
    margin:0;min-height:100svh;color:var(--ink);
    font-family:var(--sans);font-weight:300;font-size:16px;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  #sky{position:fixed;inset:0;z-index:-1}
  #runner{position:fixed;left:0;right:0;bottom:0;height:96px;width:100%;z-index:3;pointer-events:none}
  .wrap{
    max-width:1040px;margin:0 auto;padding:0 clamp(20px,5vw,48px);
    min-height:100svh;display:flex;flex-direction:column;
  }

  /* ---------- corner signature ---------- */
  .top{display:flex;align-items:flex-start;padding:26px 0 0}
  .greet{
    font-family:var(--mono);font-size:10px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--warm);margin-bottom:6px;
  }
  h1{
    margin:0;font-family:var(--serif);font-weight:300;
    font-size:clamp(22px,3.4vw,32px);line-height:1.1;letter-spacing:.01em;
  }
  h1 em{font-style:italic;font-weight:600;color:var(--warm)}

  /* ---------- workbench ---------- */
  .bench{flex:1;display:flex;flex-direction:column;justify-content:center;padding:26px 0 30px}
  .bench-head{
    display:flex;align-items:baseline;gap:16px;margin-bottom:22px;
  }
  .bench-head h2{
    margin:0;font-family:var(--serif);font-weight:400;font-style:italic;
    font-size:clamp(24px,4vw,34px);letter-spacing:.01em;
  }
  .bench-head .rule{flex:1;height:1px;background:var(--line)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px}
  .card{
    --accent:var(--warm);
    position:relative;display:flex;flex-direction:column;gap:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:24px 24px 20px;color:inherit;text-decoration:none;
    backdrop-filter:blur(5px);
    transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
  }
  .card:hover,.card:focus-visible{
    transform:translateY(-4px);border-color:var(--accent);
    box-shadow:0 22px 60px -28px var(--accent);outline:none;
  }
  .card .status{
    display:flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10px;letter-spacing:.24em;
    text-transform:uppercase;color:var(--dim);
  }
  .card .dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex:none}
  .card.ok .dot{background:var(--up);box-shadow:0 0 9px var(--up);animation:pulse 2.4s infinite}
  .card.fail .dot{background:var(--down)}
  .card.ok .status .st{color:var(--up)}
  @keyframes pulse{50%{opacity:.35}}
  .card h3{
    margin:2px 0 0;font-family:var(--serif);font-weight:600;
    font-size:23px;letter-spacing:.01em;
  }
  .card p{margin:0;color:var(--mut);font-size:14.5px;line-height:1.7;flex:1}
  .card .ro{
    font-family:var(--mono);font-size:12.5px;color:var(--ink);
    font-variant-numeric:tabular-nums;min-height:17px;letter-spacing:.03em;
  }
  .card .ro .up{color:var(--up)} .card .ro .down{color:var(--down)}
  .card .visit{
    font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--accent);transition:transform .2s ease;align-self:flex-start;
  }
  .card:hover .visit{transform:translateX(5px)}

  .card.ghost{
    border-style:dashed;background:none;justify-content:center;min-height:150px;
  }
  .card.ghost:hover{transform:none;box-shadow:none;border-color:var(--dim)}
  .card.ghost h3{color:var(--dim);font-style:italic;font-weight:400}
  .card.ghost p{flex:0}

  footer{
    padding:44px 0 40px;text-align:center;
    font-family:var(--mono);font-size:11px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--dim);
  }
  footer .moon{color:var(--warm)}
  @media (prefers-reduced-motion:reduce){
    .card,.card .visit{transition:none}
    .card.ok .dot{animation:none}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>
<canvas id="runner" aria-hidden="true"></canvas>

<div class="wrap">
  <header class="top">
    <div>
      <div class="greet" id="greet">Good evening</div>
      <h1>hey — i'm <em>Keith</em>.</h1>
    </div>
  </header>

  <section class="bench">
    <div class="bench-head"><h2>On the workbench</h2><div class="rule"></div></div>
    <div class="cards" id="cards"></div>
  </section>

  <footer><span class="moon">☾</span> &nbsp;made at night · keith</footer>
</div>

<script>
(function(){
"use strict";
var reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;
var $=function(id){return document.getElementById(id)};
var esc=function(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})};

/* ---------- dusk sky: stars + warm horizon + fireflies ---------- */
var cv=$("sky"),cx=cv.getContext("2d");
var stars=[],flies=[],meteors=[],W=0,H=0,lastMeteor=0;
function size(){
  var d=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=W*d;cv.height=H*d;cx.setTransform(d,0,0,d,0,0);
  stars=[];flies=[];
  for(var i=0,n=Math.floor(W*H/6000);i<n;i++)stars.push({
    x:Math.random()*W,y:Math.random()*H*.82,r:Math.random()*1.25+.25,
    p:Math.random()*6.28,s:.3+Math.random()*.7
  });
  for(i=0;i<Math.max(6,Math.floor(W/160));i++)flies.push({
    x:Math.random()*W,y:H*.7+Math.random()*H*.28,
    a:Math.random()*6.28,sp:.14+Math.random()*.2,
    p:Math.random()*6.28,ps:.4+Math.random()*.8
  });
}
addEventListener("resize",size);size();
function frame(t){
  cx.clearRect(0,0,W,H);
  var g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#070912");g.addColorStop(.65,"#0B0C17");g.addColorStop(1,"#171020");
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  var hg=cx.createRadialGradient(W*.5,H*1.12,H*.05,W*.5,H*1.12,H*.62);
  hg.addColorStop(0,"rgba(255,142,94,.20)");hg.addColorStop(.5,"rgba(255,142,94,.06)");hg.addColorStop(1,"rgba(255,142,94,0)");
  cx.fillStyle=hg;cx.fillRect(0,H*.4,W,H*.6);
  var i;
  cx.fillStyle="#F5EFE6";
  for(i=0;i<stars.length;i++){
    var s=stars[i];
    cx.globalAlpha=(reduced?.5:(.22+.5*Math.abs(Math.sin(t/1600*s.s+s.p))))*.8;
    cx.beginPath();cx.arc(s.x,s.y,s.r,0,6.28);cx.fill();
  }
  for(i=0;i<flies.length;i++){
    var f=flies[i];
    if(!reduced){
      f.a+=(Math.random()-.5)*.3;
      f.x+=Math.cos(f.a)*f.sp;f.y+=Math.sin(f.a)*f.sp*.6;
      if(f.x<-10)f.x=W+10;if(f.x>W+10)f.x=-10;
      if(f.y<H*.62)f.y=H*.62;if(f.y>H)f.y=H;
    }
    var glow=reduced?.5:Math.max(0,Math.sin(t/900*f.ps+f.p));
    if(glow>.05){
      cx.globalAlpha=glow*.85;
      cx.fillStyle="#FFC48E";
      cx.beginPath();cx.arc(f.x,f.y,1.6,0,6.28);cx.fill();
      cx.globalAlpha=glow*.18;
      cx.beginPath();cx.arc(f.x,f.y,6,0,6.28);cx.fill();
      cx.fillStyle="#F5EFE6";
    }
  }
  cx.globalAlpha=1;
  if(!reduced){
    if(t-lastMeteor>11000+Math.random()*9000){
      lastMeteor=t;
      meteors.push({x:Math.random()*W*.8+W*.1,y:-20,vx:2.5+Math.random()*3,vy:4.5+Math.random()*3,life:1});
    }
    for(i=meteors.length-1;i>=0;i--){
      var m=meteors[i];
      m.x+=m.vx*3;m.y+=m.vy*3;m.life-=.02;
      if(m.life<=0||m.y>H*.7){meteors.splice(i,1);continue}
      var mg=cx.createLinearGradient(m.x-m.vx*14,m.y-m.vy*14,m.x,m.y);
      mg.addColorStop(0,"rgba(245,239,230,0)");mg.addColorStop(1,"rgba(245,239,230,"+(.6*m.life)+")");
      cx.strokeStyle=mg;cx.lineWidth=1.5;
      cx.beginPath();cx.moveTo(m.x-m.vx*14,m.y-m.vy*14);cx.lineTo(m.x,m.y);cx.stroke();
    }
    requestAnimationFrame(frame);
  }
}
requestAnimationFrame(frame);

/* ---------- greeting by visitor's local time ---------- */
var h=new Date().getHours();
$("greet").textContent=(h<5?"You're up late":h<12?"Good morning":h<17?"Good afternoon":"Good evening");

/* ---------- workbench cards from sites.json ---------- */
var BLURBS={
  "spcx-tracker":"the SPCX ticker, watching itself.",
  "ai-model-tracker":"the AI model wire. every release, every price cut.",
  "typing-trainer":"KeyFlow. type faster, feel things."
};
var fmt=function(n){return n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})};
function probe(s){
  var a=document.getElementById("site-"+s.slug);
  if(!s.probe){a.classList.add("ok");return}
  fetch(s.probe.url+"?ts="+Date.now(),{cache:"no-store"})
    .then(function(r){if(!r.ok)throw 0;return s.probe.type==="ping"?null:r.json()})
    .then(function(j){
      a.classList.add("ok");
      a.querySelector(".st").textContent="live";
      var ro=a.querySelector(".ro");
      if(s.probe.type==="spcx"){
        var d=(j.meta.price-j.meta.previousClose)/j.meta.previousClose*100,up=d>=0;
        ro.innerHTML="$"+fmt(j.meta.price)+' <span class="'+(up?"up":"down")+'">'+(up?"▲":"▼")+" "+Math.abs(d).toFixed(2)+"% today</span>";
      }else if(s.probe.type==="models"){
        var now=Date.now()/1000;
        var adds=j.models.filter(function(m){return m.created&&m.created>now-30*86400}).length;
        ro.innerHTML=j.models.length+' models tracked · <span class="up">+'+adds+" this month</span>";
      }
    })
    .catch(function(){a.classList.add("fail");a.querySelector(".st").textContent="napping"});
}
/* ---------- the little night walker ---------- */
var rc=$("runner"),rx=rc.getContext("2d"),RW=0,RH=96;
function rsize(){
  var d=Math.min(devicePixelRatio||1,2);
  RW=innerWidth;
  rc.width=RW*d;rc.height=RH*d;rx.setTransform(d,0,0,d,0,0);
}
addEventListener("resize",rsize);rsize();

var guy={
  x:Math.min(140,innerWidth*.2),dir:1,y:0,vy:0,
  state:"walk",until:0,phase:0,blink:0
};
function pick(now){
  var r=Math.random();
  if(guy.state==="walk"){
    if(r<.55){guy.state="idle";guy.until=now+1200+Math.random()*2600}
    else if(r<.7){guy.state="hop";guy.vy=-150}
    else{guy.dir*=-1;guy.until=now+2500+Math.random()*4500}
  }else{
    guy.state="walk";
    if(Math.random()<.4)guy.dir*=-1;
    guy.until=now+2500+Math.random()*5000;
  }
}
var lastR=0;
function runnerFrame(now){
  var dt=Math.min((now-lastR)/1000,.05);lastR=now;
  rx.clearRect(0,0,RW,RH);
  var ground=RH-8;

  if(guy.state==="hop"){
    guy.vy+=520*dt;guy.y-=guy.vy*dt;
    if(guy.y<=0){guy.y=0;guy.state="walk";guy.until=now+2000+Math.random()*4000}
    guy.x+=guy.dir*46*dt;
  }else if(guy.state==="walk"){
    guy.x+=guy.dir*40*dt;
    guy.phase+=dt*9;
    if(now>guy.until)pick(now);
  }else{ /* idle */
    guy.phase+=dt*1.4;
    if(now>guy.until)pick(now);
  }
  if(guy.x<26){guy.x=26;guy.dir=1}
  if(guy.x>RW-26){guy.x=RW-26;guy.dir=-1}
  if(Math.random()<.006)guy.blink=6;
  if(guy.blink>0)guy.blink--;

  var walking=guy.state==="walk";
  var bob=walking?Math.abs(Math.sin(guy.phase))*1.8:Math.sin(guy.phase)*0.7;
  var gy=ground-guy.y-bob;

  rx.save();
  rx.translate(guy.x,gy);
  rx.scale(guy.dir,1);

  /* shadow */
  rx.globalAlpha=Math.max(.08,.22-guy.y*.002);
  rx.fillStyle="#000";
  rx.beginPath();rx.ellipse(0,bob+guy.y+1,9-guy.y*.03,2.4,0,0,6.28);rx.fill();
  rx.globalAlpha=1;

  /* lantern glow */
  var sway=Math.sin(guy.phase*(walking?1:.8))*(walking?2.4:1.2);
  var lx=8,ly=-7+sway*.4;
  var lg=rx.createRadialGradient(lx,ly,1,lx,ly,26);
  lg.addColorStop(0,"rgba(255,196,142,.5)");lg.addColorStop(1,"rgba(255,196,142,0)");
  rx.fillStyle=lg;rx.beginPath();rx.arc(lx,ly,26,0,6.28);rx.fill();

  /* legs */
  var swing=walking?Math.sin(guy.phase)*4.2:0;
  rx.strokeStyle="#F5EFE6";rx.lineWidth=2;rx.lineCap="round";
  rx.beginPath();rx.moveTo(-1,-8);rx.lineTo(-1+swing,0);rx.stroke();
  rx.beginPath();rx.moveTo(1,-8);rx.lineTo(1-swing,0);rx.stroke();

  /* body */
  rx.fillStyle="#F5EFE6";
  rx.beginPath();rx.roundRect(-3.5,-19,7,12,3);rx.fill();

  /* scarf */
  rx.fillStyle="#FFAE7B";
  rx.fillRect(-3.5,-17.5,7,2.5);
  rx.beginPath();
  rx.moveTo(-3,-16);
  rx.quadraticCurveTo(-8-(walking?2:0),-14+Math.sin(guy.phase*1.3)*1.6,-9-(walking?3:0),-11+Math.sin(guy.phase*1.3)*2);
  rx.lineTo(-6,-12);rx.closePath();rx.fill();

  /* arm + lantern */
  rx.strokeStyle="#F5EFE6";rx.lineWidth=1.8;
  rx.beginPath();rx.moveTo(2,-15);rx.quadraticCurveTo(6,-13,lx-1,ly-3);rx.stroke();
  rx.strokeStyle="#FFC48E";rx.lineWidth=1.2;
  rx.strokeRect(lx-2.5,ly-3,5,6);
  rx.fillStyle="#FFC48E";
  rx.globalAlpha=.75+Math.sin(now/140)*.25;
  rx.fillRect(lx-1.2,ly-1.5,2.4,3);
  rx.globalAlpha=1;

  /* head */
  rx.fillStyle="#F5EFE6";
  rx.beginPath();rx.arc(0,-23,4.4,0,6.28);rx.fill();
  /* eye */
  if(guy.blink===0){
    rx.fillStyle="#171020";
    rx.beginPath();rx.arc(2,-23.5,.9,0,6.28);rx.fill();
  }

  rx.restore();
  if(!reduced)requestAnimationFrame(runnerFrame);
}
if(reduced){lastR=performance.now();runnerFrame(lastR)}
else requestAnimationFrame(function(t){lastR=t;requestAnimationFrame(runnerFrame)});

fetch("sites.json?ts="+Date.now(),{cache:"no-store"})
  .then(function(r){return r.json()})
  .then(function(cfg){
    $("cards").innerHTML=cfg.sites.map(function(s){
      return '<a class="card" id="site-'+esc(s.slug)+'" href="'+esc(s.href)+'" style="--accent:'+esc(s.accent)+'">'
        +'<span class="status"><span class="dot"></span><span class="st">waking…</span></span>'
        +"<h3>"+esc(s.title)+"</h3>"
        +"<p>"+esc(BLURBS[s.slug]||s.tagline||"")+"</p>"
        +'<span class="ro"></span>'
        +'<span class="visit">wander in →</span>'
        +"</a>";
    }).join("")
    +'<div class="card ghost" aria-hidden="true"><h3>something new</h3><p>soon.</p></div>';
    cfg.sites.forEach(probe);
  })
  .catch(function(){$("cards").innerHTML='<div class="card ghost"><h3>the workbench is dark</h3><p>couldn\'t load sites.json.</p></div>'});
})();
</script>
</body>
</html>
