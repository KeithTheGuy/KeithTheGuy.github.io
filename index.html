<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KeithTheGuy — Ground Station</title>
<meta name="description" content="Ground station: live screens and experiments launched by KeithTheGuy.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%F0%9F%93%A1%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@100;300;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#05070C;
    --panel:#0A0E16;
    --line:#161D29;
    --ink:#F0F3F7;
    --mut:#8A99AB;
    --dim:#465264;
    --up:#2FD98A;
    --down:#FF4D42;
    --mono:"IBM Plex Mono",Consolas,monospace;
    --sans:"Saira",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html{background:var(--void);scroll-behavior:smooth}
  body{
    margin:0;min-height:100svh;color:var(--ink);
    font-family:var(--sans);font-weight:300;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;
  }
  #sky{position:fixed;inset:0;z-index:-1}
  .wrap{max-width:1160px;margin:0 auto;padding:0 clamp(18px,4vw,44px)}

  .top{display:flex;align-items:center;gap:14px;padding:24px 0 0}
  .callsign{font-family:var(--mono);font-size:11px;letter-spacing:.3em;color:var(--dim)}
  .utc{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--mut);font-variant-numeric:tabular-nums;letter-spacing:.08em}

  .hero{padding:clamp(56px,16vh,150px) 0 clamp(36px,7vh,70px)}
  .eyebrow{
    font-family:var(--mono);font-size:clamp(11px,1.4vw,13px);letter-spacing:.5em;
    text-transform:uppercase;color:var(--mut);margin-bottom:18px;
  }
  .eyebrow b{color:var(--ink);font-weight:400}
  h1{
    margin:0;font-weight:100;text-transform:uppercase;
    font-size:clamp(44px,9.5vw,120px);line-height:.95;letter-spacing:.12em;
    text-shadow:0 0 90px rgba(159,196,232,.25);text-wrap:balance;
  }
  h1 b{font-weight:600}
  .sub{
    margin-top:22px;max-width:52ch;color:var(--mut);
    font-size:clamp(14px,1.8vw,17px);line-height:1.65;letter-spacing:.02em;
  }

  .grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
    gap:18px;padding-bottom:26px;
  }
  .card{
    --accent:#9FB4CC;
    position:relative;display:flex;flex-direction:column;gap:12px;
    background:linear-gradient(180deg,var(--panel),rgba(10,14,22,.6));
    border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:22px 22px 18px;
    color:inherit;text-decoration:none;
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
  }
  .card:hover,.card:focus-visible{
    transform:translateY(-4px);
    box-shadow:0 18px 50px -18px rgba(0,0,0,.9),0 0 34px -12px var(--accent);
    outline:none;border-color:var(--accent);
  }
  .card .uplink{
    display:flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:10px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;
  }
  .card .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex:none}
  .card.ok .dot{background:var(--up);box-shadow:0 0 10px var(--up);animation:pulse 2.2s infinite}
  .card.fail .dot{background:var(--down);box-shadow:0 0 10px var(--down)}
  .card.ok .uplink .state{color:var(--up)}
  .card.fail .uplink .state{color:var(--down)}
  @keyframes pulse{50%{opacity:.35}}
  .card h2{
    margin:0;font-weight:600;text-transform:uppercase;
    font-size:22px;letter-spacing:.14em;
  }
  .card .tag{color:var(--mut);font-size:13.5px;line-height:1.6;flex:1;letter-spacing:.02em}
  .card .readout{
    font-family:var(--mono);font-size:13px;color:var(--ink);
    font-variant-numeric:tabular-nums;min-height:18px;letter-spacing:.03em;
  }
  .card .readout .up{color:var(--up)} .card .readout .down{color:var(--down)}
  .card .foot{
    display:flex;align-items:center;
    font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;
  }
  .card .foot .go{margin-left:auto;color:var(--accent);transition:transform .18s ease}
  .card:hover .foot .go{transform:translateX(5px)}

  .card.ghost{
    border:1px dashed var(--line);border-left:3px dashed var(--dim);
    background:none;justify-content:center;align-items:flex-start;min-height:180px;
  }
  .card.ghost:hover{transform:none;box-shadow:none;border-color:var(--dim)}
  .card.ghost h2{color:var(--dim)}
  .card.ghost .tag{flex:0}

  footer{
    padding:26px 0 40px;display:flex;gap:10px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);
  }
  footer a{color:var(--mut);text-decoration:none;border-bottom:1px solid var(--line)}
  footer a:hover{color:var(--ink)}

  @media (prefers-reduced-motion:reduce){
    .card,.card .foot .go{transition:none}
    .card.ok .dot{animation:none}
    html{scroll-behavior:auto}
  }
</style>
</head>
<body>
<canvas id="sky" aria-hidden="true"></canvas>

<div class="wrap">
  <div class="top">
    <span class="callsign">KEITHTHEGUY.GITHUB.IO</span>
    <span class="utc" id="utc"></span>
  </div>

  <section class="hero">
    <div class="eyebrow">Uplink established <b>//</b> all screens live</div>
    <h1>Ground <b>Station</b></h1>
    <p class="sub">Live screens and experiments, launched into orbit from this account
    and left running. Telemetry refreshes itself; nothing here needs a human.</p>
  </section>

  <div class="grid" id="grid"></div>

  <footer>
    <span>Operated by KeithTheGuy</span>
    <span>·</span><a href="https://github.com/KeithTheGuy">GitHub</a>
    <span>·</span><span>Add a mission: edit sites.json</span>
  </footer>
</div>

<script>
(function(){
"use strict";
var reduced=matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---------- starfield with drift + meteors + parallax ---------- */
var cv=document.getElementById("sky"),cx=cv.getContext("2d");
var stars=[],meteors=[],mx=0,my=0,W=0,H=0;
function size(){
  var d=Math.min(devicePixelRatio||1,2);
  W=innerWidth;H=innerHeight;
  cv.width=W*d;cv.height=H*d;cx.setTransform(d,0,0,d,0,0);
  stars=[];
  var n=Math.floor(W*H/5200);
  for(var i=0;i<n;i++)stars.push({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.3+.25,z:Math.random(),
    p:Math.random()*6.28,s:.3+Math.random()*.7
  });
}
addEventListener("resize",size);size();
addEventListener("pointermove",function(e){
  mx=(e.clientX/W-.5);my=(e.clientY/H-.5);
});
var lastMeteor=0;
function frame(t){
  cx.clearRect(0,0,W,H);
  var g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#05070C");g.addColorStop(1,"#080D16");
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  var i;
  cx.fillStyle="#F0F3F7";
  for(i=0;i<stars.length;i++){
    var s=stars[i];
    var px=s.x-mx*s.z*18,py=s.y-my*s.z*12;
    if(!reduced){s.x+=0.008*(s.z+.2);if(s.x>W+2)s.x=-2;}
    cx.globalAlpha=(reduced?.5:(.25+.5*Math.abs(Math.sin(t/1500*s.s+s.p))))*(.35+s.z*.65);
    cx.beginPath();cx.arc(px,py,s.r,0,6.28);cx.fill();
  }
  cx.globalAlpha=1;
  if(!reduced){
    if(t-lastMeteor>7000+Math.random()*6000){
      lastMeteor=t;
      meteors.push({x:Math.random()*W*.8+W*.1,y:-20,vx:3+Math.random()*3,vy:5+Math.random()*3,life:1});
    }
    for(i=meteors.length-1;i>=0;i--){
      var m=meteors[i];
      m.x+=m.vx*3;m.y+=m.vy*3;m.life-=.02;
      if(m.life<=0||m.y>H+30){meteors.splice(i,1);continue}
      var mg=cx.createLinearGradient(m.x-m.vx*14,m.y-m.vy*14,m.x,m.y);
      mg.addColorStop(0,"rgba(240,243,247,0)");mg.addColorStop(1,"rgba(240,243,247,"+(.7*m.life)+")");
      cx.strokeStyle=mg;cx.lineWidth=1.6;
      cx.beginPath();cx.moveTo(m.x-m.vx*14,m.y-m.vy*14);cx.lineTo(m.x,m.y);cx.stroke();
    }
    requestAnimationFrame(frame);
  }
}
requestAnimationFrame(frame);

/* ---------- UTC clock ---------- */
function clock(){
  var d=new Date();
  document.getElementById("utc").textContent=
    d.toISOString().slice(11,19)+" UTC";
}
clock();setInterval(clock,1000);

/* ---------- mission cards ---------- */
var esc=function(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})};
function card(s){
  return '<a class="card" id="card-'+esc(s.slug)+'" href="'+esc(s.href)+'" style="--accent:'+esc(s.accent)+'">'
    +'<span class="uplink"><span class="dot"></span><span class="state">Acquiring…</span></span>'
    +"<h2>"+esc(s.title)+"</h2>"
    +'<p class="tag">'+esc(s.tagline)+"</p>"
    +'<div class="readout" id="ro-'+esc(s.slug)+'">—</div>'
    +'<div class="foot"><span>EST. '+esc(s.est)+'</span><span class="go">→</span></div>'
    +"</a>";
}
var ghost='<div class="card ghost" aria-hidden="true">'
  +'<span class="uplink"><span class="dot"></span><span class="state">Pad reserved</span></span>'
  +"<h2>Next mission</h2>"
  +'<p class="tag">T-minus unknown.</p>'
  +"</div>";

function setState(slug,ok,readout){
  var c=document.getElementById("card-"+slug);
  if(!c)return;
  c.classList.add(ok?"ok":"fail");
  c.querySelector(".state").textContent=ok?"Operational":"Unresponsive";
  if(readout!=null)document.getElementById("ro-"+slug).innerHTML=readout;
  else if(!ok)document.getElementById("ro-"+slug).textContent="no telemetry";
}
var fmt=function(n){return n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})};

function probe(s){
  if(!s.probe){setState(s.slug,true,"");return}
  fetch(s.probe.url+(s.probe.url.indexOf(".json")>0?"?ts="+Date.now():""),{cache:"no-store"})
    .then(function(r){
      if(!r.ok)throw 0;
      return s.probe.type==="ping"?null:r.json();
    })
    .then(function(j){
      if(s.probe.type==="spcx"){
        var p=j.meta.price,pc=j.meta.previousClose,d=(p-pc)/pc*100,up=d>=0;
        setState(s.slug,true,"$"+fmt(p)+' <span class="'+(up?"up":"down")+'">'+(up?"▲ +":"▼ −")+Math.abs(d).toFixed(2)+"%</span> today");
      }else if(s.probe.type==="models"){
        var now=Date.now()/1000;
        var adds=j.models.filter(function(m){return m.created&&m.created>now-30*86400}).length;
        setState(s.slug,true,j.models.length+' models <span class="up">+'+adds+"</span> this month");
      }else{
        setState(s.slug,true,"online");
      }
    })
    .catch(function(){setState(s.slug,false)});
}

fetch("sites.json?ts="+Date.now(),{cache:"no-store"})
  .then(function(r){return r.json()})
  .then(function(cfg){
    document.getElementById("grid").innerHTML=cfg.sites.map(card).join("")+ghost;
    cfg.sites.forEach(probe);
  })
  .catch(function(){
    document.getElementById("grid").innerHTML='<div class="card fail"><span class="uplink"><span class="dot"></span><span class="state">Fault</span></span><h2>Directory offline</h2><p class="tag">sites.json failed to load.</p></div>';
  });
})();
</script>
</body>
</html>
